title: إتصل بنا
permalink: /ma/contact/
---

<div class="py-12" dir="rtl">
  <div class="max-w-4xl mx-auto px-6">
    <div class="text-center mb-16">
      <h1 class="text-6xl font-black text-white mb-6 italic uppercase tracking-tighter">تواصل مع <span class="text-moroccangreen">DINO</span></h1>
      <p class="text-xl text-gray-400">عندك شي فكرة؟ بغيتي تعاون؟ أو بغيتي إعلان؟ مرحبا بك.</p>
    </div>

    <div class="grid md:grid-cols-2 gap-12">
      <!-- Contact Info -->
      <div class="space-y-8">
        <div class="p-8 rounded-[3rem] bg-white/5 border border-white/10">
          <h3 class="text-xs font-black text-moroccangreen uppercase tracking-widest mb-4">Email Business</h3>
          <p class="text-2xl font-black text-white">contact@dinocrafting.com</p>
        </div>
        <div class="p-8 rounded-[3rem] bg-white/5 border border-white/10">
          <h3 class="text-xs font-black text-moroccangreen uppercase tracking-widest mb-4">Discord Support</h3>
          <p class="text-2xl font-black text-white">Dino#0000</p>
        </div>
      </div>

      <!-- Simple Form (Mock) -->
      <div class="p-10 rounded-[4rem] bg-white/5 border border-white/10 relative overflow-hidden">
        <div class="absolute inset-0 bg-moroccangreen/5 blur-[80px]"></div>
        <form class="relative space-y-6">
          <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">الاسم الكامل</label>
            <input type="text" placeholder="Dino fan" class="w-full px-6 py-4 bg-black/40 border border-white/5 rounded-2xl text-white outline-none focus:border-moroccangreen transition-all">
          </div>
          <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">الموضوع</label>
            <input type="text" placeholder="فكرة مود جديدة..." class="w-full px-6 py-4 bg-black/40 border border-white/5 rounded-2xl text-white outline-none focus:border-moroccangreen transition-all">
          </div>
          <div>
            <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-2">الرسالة</label>
            <textarea rows="4" placeholder="سلام دينو، بغيت نسولك على..." class="w-full px-6 py-4 bg-black/40 border border-white/5 rounded-2xl text-white outline-none focus:border-moroccangreen transition-all"></textarea>
          </div>
          <button class="w-full py-5 bg-moroccangreen text-white font-black rounded-2xl shadow-xl shadow-moroccangreen/30 hover:scale-105 transition-all uppercase tracking-widest">إرسال الرسالة</button>
        </form>
      </div>
    </div>
  </div>
</div>
