<header class="sticky top-0 z-50 bg-white/80 dark:bg-darkbg/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800"
        x-data="{ 
          level: 1,
          exp: 0,
          coins: 0,
          mobileMenu: false,
          SALT: 'dino_secret_99_empire',
          
          getSignature(val1, val2) {
            return btoa(this.SALT + val1 + '_' + val2).split('').reverse().join('');
          },

          verifySecurity() {
            const storedLvl = localStorage.getItem('dinoLevel') || 1;
            const storedExp = localStorage.getItem('dinoExp') || 0;
            const storedCoins = localStorage.getItem('dinoCoins') || 0;
            const storedSig = localStorage.getItem('dinoSig');
            
            const expectedSig = this.getSignature(storedLvl, storedCoins);
            
            if (storedSig && storedSig !== expectedSig) {
              console.warn('⚠️ Anti-Cheat: Invalid Signature detected. Resetting stats.');
              this.resetStats();
              return false;
            }
            this.level = parseInt(storedLvl);
            this.exp = parseInt(storedExp);
            this.coins = parseInt(storedCoins);
            return true;
          },

          saveStats() {
            localStorage.setItem('dinoLevel', this.level);
            localStorage.setItem('dinoExp', this.exp);
            localStorage.setItem('dinoCoins', this.coins);
            localStorage.setItem('dinoSig', this.getSignature(this.level, this.coins));
          },

          resetStats() {
            this.level = 1; this.exp = 0; this.coins = 0;
            this.saveStats();
          },

          init() {
            if (!this.verifySecurity()) return;

            // Holiday Engine Logic
            const now = new Date();
            const year = now.getFullYear();
            const holidays = [
              { name: 'ramadan', start: new Date(year, 1, 18), end: new Date(year, 2, 19) },
              { name: 'eid-fitr', start: new Date(year, 2, 20), end: new Date(year, 2, 22) },
              { name: 'eid-adha', start: new Date(year, 4, 27), end: new Date(year, 4, 30) }
            ];

            const currentHoliday = holidays.find(h => now >= h.start && now <= h.end);
            if (currentHoliday) document.body.classList.add('theme-' + currentHoliday.name);

            // Reward Visit
            this.exp += 5;
            this.coins += 5;
            if (this.exp >= 100) { this.level++; this.exp = 0; }
            this.saveStats();
          }
        }">
  <div class="container mx-auto px-4 h-20 flex items-center justify-between">
    <!-- Logo & Level -->
    <a href="/{{ lang }}/" class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl bg-moroccangreen flex items-center justify-center text-white shadow-lg shadow-moroccangreen/20 overflow-hidden">
        <img src="/assets/images/avatarHead2.png" class="w-full h-full object-cover">
      </div>
      <div class="hidden sm:block">
        <h1 class="text-lg font-black text-white leading-none uppercase italic">DINO CRAFTING</h1>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-[10px] font-black text-moroccangreen uppercase tracking-widest" x-text="'LVL ' + level"></span>
          <div class="w-16 h-1 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full bg-moroccangreen" :style="'width: ' + (exp % 100) + '%'"></div>
          </div>
        </div>
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden lg:flex items-center gap-8">
      <a href="/{{ lang }}/projects/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors {% if page.url contains '/projects/' %}text-moroccangreen{% endif %}">Projects</a>
      <a href="/{{ lang }}/shop/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors {% if page.url contains '/shop/' %}text-moroccangreen{% endif %}">Shop</a>
      <a href="/{{ lang }}/news/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors {% if page.url contains '/news/' %}text-moroccangreen{% endif %}">News</a>
      <a href="/{{ lang }}/theories/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors {% if page.url contains '/theories/' %}text-moroccangreen{% endif %}">Theories</a>
      <a href="/{{ lang }}/socials/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors {% if page.url contains '/socials/' %}text-moroccangreen{% endif %}">Socials</a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
      <div class="hidden md:flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-xl text-yellow-500 font-black text-xs">
        <span x-text="coins"></span>
        <span>🪙</span>
      </div>

      <!-- Language Switcher (Intelligent Path Preservation) -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all uppercase font-black text-[10px] text-white">
          <span>{{ lang }}</span>
          <svg class="w-3 h-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div x-show="open" @click.away="open = false" class="absolute top-full right-0 mt-2 w-32 bg-black/90 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-2xl z-50">
          {% assign page_path = page.url | remove_first: '/' | remove_first: 'ma/' | remove_first: 'en/' | remove_first: 'fr/' %}
          <a href="/ma/{{ page_path }}" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇲🇦 DARIJA</a>
          <a href="/en/{{ page_path }}" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇺🇸 ENGLISH</a>
          <a href="/fr/{{ page_path }}" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇫🇷 FRENCH</a>
        </div>
      </div>

      <!-- Hamburger Button -->
      <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-white p-2">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path x-show="!mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /><path x-show="mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>
  </div>

  <!-- Mobile Menu Drawer -->
  <div x-show="mobileMenu" x-transition class="lg:hidden fixed inset-0 z-40 bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center space-y-12">
    <nav class="flex flex-col items-center space-y-8">
      <a @click="mobileMenu = false" href="/{{ lang }}/" class="text-4xl font-black text-white uppercase italic">Home</a>
      <a @click="mobileMenu = false" href="/{{ lang }}/projects/" class="text-4xl font-black text-white uppercase italic">Projects</a>
      <a @click="mobileMenu = false" href="/{{ lang }}/shop/" class="text-4xl font-black text-white uppercase italic">Shop</a>
      <a @click="mobileMenu = false" href="/{{ lang }}/news/" class="text-4xl font-black text-white uppercase italic">News</a>
      <a @click="mobileMenu = false" href="/{{ lang }}/theories/" class="text-4xl font-black text-white uppercase italic">Theories</a>
      <a @click="mobileMenu = false" href="/{{ lang }}/socials/" class="text-4xl font-black text-white uppercase italic">Socials</a>
    </nav>
    <div class="flex gap-4">
      <a href="#" class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-white"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93 0.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-0.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>
      <a href="#" class="w-12 h-12 rounded-2xl bg-white/10 flex items-center justify-center text-white"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515a.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0a12.64 12.64 0 0 0-.617-1.25a.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057a19.9 19.9 0 0 0 5.993 3.03a.078.078 0 0 0 .084-.028a14.09 14.09 0 0 0 1.226-1.994a.076.076 0 0 0-.041-.106a13.107 13.107 0 0 1-1.872-.892a.077.077 0 0 1-.008-.128a10.2 10.2 0 0 0 .372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127a12.299 12.299 0 0 1-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028a19.839 19.839 0 0 0 6.002-3.03a.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg></a>
    </div>
  </div>
</header>
