---
layout: default
lang: fr
title: Boutique Dino
permalink: /fr/shop/
---

<div class="py-20" x-data="{ 
    coins: parseInt(localStorage.getItem('dinoCoins') || 0),
    items: [
      { id: 1, title: 'Astuce Minecraft Secrète', desc: 'Révélez un secret de pro qui changera votre façon de jouer.', price: 100, icon: '💡', type: 'Digital' },
      { id: 2, title: 'Rôle VIP Discord', desc: 'Demandez un rang spécial sur notre serveur Discord avec une couleur personnalisée.', price: 500, icon: '🛡️', type: 'Social' },
      { id: 3, title: 'Dédicace dans un Mod', desc: 'Votre nom apparaîtra dans les crédits de la prochaine mise à jour.', price: 1000, icon: '🔥', type: 'Legacy' },
      { id: 4, title: 'Soumettre une Idée de Mod', desc: 'Envoyez-nous votre idée et nous pourrions la construire dans la prochaine vidéo.', price: 2000, icon: '🚀', type: 'Creator' }
    ],
    buy(item) {
      if (this.coins >= item.price) {
        this.coins -= item.price;
        localStorage.setItem('dinoCoins', this.coins);
        alert('Félicitations ! Vous avez acheté : ' + item.title + '. Nous vous contacterons bientôt.');
        location.reload();
      } else {
        alert('Pas assez de pièces ! Continuez à naviguer pour en gagner plus.');
      }
    }
  }">
  
  <div class="max-w-6xl mx-auto px-6">
    <!-- Header -->
    <div class="text-center mb-24 relative">
      <div class="absolute inset-0 flex items-center justify-center -z-10">
        <div class="w-64 h-64 bg-yellow-500/10 blur-[120px] rounded-full animate-pulse"></div>
      </div>
      <h1 class="text-7xl font-black text-white mb-6 uppercase italic tracking-tighter">BOUTIQUE <span class="text-yellow-500">DINO</span></h1>
      <p class="text-xl text-gray-400 max-w-2xl mx-auto">Dépensez vos pièces durement gagnées pour des récompenses exclusives !</p>
      
      <div class="mt-12 inline-flex items-center gap-4 px-8 py-4 bg-white/5 border border-white/10 rounded-3xl">
        <span class="text-gray-400 font-bold uppercase tracking-widest text-sm">Votre Solde :</span>
        <span class="text-3xl font-black text-yellow-500" x-text="coins"></span>
        <span class="text-2xl">🪙</span>
      </div>
    </div>

    <!-- Shop Grid -->
    <div class="grid md:grid-cols-2 gap-12 text-left">
      <template x-for="item in items" :key="item.id">
        <div class="group relative p-10 rounded-[4rem] bg-white/5 border border-white/10 hover:border-yellow-500/30 transition-all duration-700 overflow-hidden">
          <div class="absolute -top-24 -right-24 w-64 h-64 bg-yellow-500/5 blur-[80px] rounded-full group-hover:bg-yellow-500/10 transition-all"></div>
          
          <div class="relative z-10">
            <div class="flex justify-between items-start mb-8">
              <div class="w-20 h-20 bg-yellow-500/10 rounded-3xl flex items-center justify-center text-4xl group-hover:scale-110 transition-transform" x-text="item.icon"></div>
              <span class="px-4 py-1 bg-white/5 text-[10px] font-black text-gray-500 rounded-full uppercase tracking-widest" x-text="item.type"></span>
            </div>
            
            <h3 class="text-3xl font-black text-white mb-4 italic" x-text="item.title"></h3>
            <p class="text-gray-400 text-lg leading-relaxed mb-10" x-text="item.desc"></p>
            
            <button @click="buy(item)" 
                    class="w-full py-5 bg-yellow-500 text-black font-black rounded-2xl shadow-xl shadow-yellow-500/20 hover:scale-105 transition-all text-xl uppercase tracking-widest italic flex items-center justify-center gap-4">
               <span>Acheter pour <span x-text="item.price"></span></span>
               <span>🪙</span>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>
</div>
