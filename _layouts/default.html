<!DOCTYPE html>
{% assign lang = page.lang | default: site.default_lang %}
{% assign locale = site.data.locales[lang] %}
<html lang="{{ lang }}" {% if lang == 'ar' or lang == 'ma' %}dir="rtl"{% else %}dir="ltr"{% endif %} x-data="{ darkMode: localStorage.getItem('darkMode') === 'true', arabiziMode: localStorage.getItem('arabiziMode') === 'true' }" :class="{ 'dark': darkMode }">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} | Dinocrafting</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@400;600;700&family=Tajawal:wght@400;700&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- Alpine JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  {% seo %}
</head>
<body class="bg-lightbg dark:bg-darkbg text-gray-900 dark:text-gray-100 transition-colors duration-300 font-sans {% if lang == 'ar' or lang == 'ma' %}font-arabic{% endif %}">

  {% include header.html %}

  <main class="container mx-auto px-4 py-8">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Theme initialization
    if (localStorage.getItem('darkMode') === null) {
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        localStorage.setItem('darkMode', 'true');
      } else {
        localStorage.setItem('darkMode', 'false');
      }
    }
  </script>
</body>
</html>
