  about_philosophy_title: "فلسفة تطوير المودات"
  about_philosophy_text: "كل مود كنطوره كيركز على حل مشاكل حقيقية فاللعب، مع أولوية للاستقرار والتوافق وتجربة المستخدم."
  about_connect_title: "تواصل معي"
  about_connect_subtitle: "تابع Dino Crafting فالسوشيال ميديا للتحديثات اليومية والمحتوى الحصري."
  community_discord_title: "سيرفر الديسكورد"
  community_discord_text: "الديسكورد ديالنا هو المكان باش تحكيلنا، تشارك فالألعاب، وتلقى المساعدة على المودات."
