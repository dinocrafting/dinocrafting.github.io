  about_story_title: "من لاعب إلى صانع محتوى"
  about_story_p1: "أنا Dino Crafting، صانع محتوى مغربي في ماينكرافت وعاشق للمودات وبناء المجتمع. البداية كانت هواية، وولات مهمة باش نقدّم محتوى قوي ومفيد."
  about_story_p2: "كنآمن أن اللعب خاصو يكون متاح للجميع، لذلك كنقدّم المحتوى بدارجة وباللغات الأخرى باش نوصل لأكبر عدد من اللاعبين."
  about_story_p3: "إلى ما كنتش كنبرمج مودات أو كنصور فيديوهات، غتلقاني فالديسكورد كنناقش أفكار جديدة مع المجتمع."
